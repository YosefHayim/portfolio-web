<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Josrade — Joseph Sabag Portfolio</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Josrade is the publisher account behind a suite of Chrome extensions and Cloudflare Worker APIs by Joseph Sabag (Full Stack / AI Software Engineer). The Josrade OAuth app authenticates users into those extensions via Google sign-in." />
    <meta name="keywords" content="Josrade, Joseph Sabag, Chrome Extensions, OAuth, Full Stack Developer, React, Node.js, TypeScript, Portfolio" />
    <meta name="author" content="Joseph Sabag" />
    <meta name="application-name" content="Josrade" />

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Josrade — Joseph Sabag Portfolio" />
    <meta property="og:description" content="Josrade is the OAuth publisher behind Joseph Sabag's Chrome extensions (Prompt Queue, Sora Auto Queue Prompts, Audio Transcriber, AI Conversation Navigator) and Cloudflare Worker APIs." />
    <meta property="og:type" content="website" />

    <!-- Performance: DNS Prefetch for external resources -->
    <link rel="dns-prefetch" href="https://api.github.com" />
    <link rel="preconnect" href="https://api.github.com" crossorigin />

    <!-- Performance: Preconnect to API server -->
    <link rel="dns-prefetch" href="https://api.yosefhayimsabag.com" />
    <link rel="preconnect" href="https://api.yosefhayimsabag.com" crossorigin />

    <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="/favicon/site.webmanifest" />

    <!-- Theme Color for mobile browsers -->
    <meta name="theme-color" content="#05df72" />

    <!-- Prevent FOUC (Flash of Unstyled Content) -->
    <style>
      /* Critical CSS - inline for fastest paint */
      body {
        margin: 0;
        background-color: #0a0a0a;
        color: #fafafa;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading spinner for initial load */
      .initial-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .initial-loader::after {
        content: '';
        width: 32px;
        height: 32px;
        border: 2px solid #05df72;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"><div class="initial-loader"></div></div>
    <!-- Static privacy policy link for crawlers (GCP OAuth verification) -->
    <a href="/privacy-policy" style="position:absolute;left:-9999px;top:-9999px;" aria-hidden="true">Privacy Policy</a>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
